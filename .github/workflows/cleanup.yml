name: Cleanup

# 清理工作流：定期清理仓库中堆积的 CI 资源（工作流运行、artifacts、caches），
# 必要时可手动触发并选择是否清理旧 release。默认仅清理，不删除 release。

on:
  schedule:
    # 每周日 UTC 18:00 运行（北京时间周一 02:00）
    - cron: '0 18 * * 0'
  workflow_dispatch:
    inputs:
      retention_days:
        description: '保留窗口（天），早于此的 CI 资源将被清理'
        required: false
        type: string
        default: '14'
      dry_run:
        description: '试运行（只打印将被清理的项目，不实际删除）'
        required: false
        type: boolean
        default: false
      clean_releases:
        description: '同时清理旧 release（仅保留最新 3 个）'
        required: false
        type: boolean
        default: false

permissions:
  actions: write    # 删除 workflow runs / artifacts / caches
  contents: write   # 删除 release（启用 clean_releases 时需要）

# 同一仓库同时只允许一个清理任务运行
concurrency:
  group: cleanup-${{ github.repository }}
  cancel-in-progress: false

env:
  RETENTION_DAYS: ${{ github.event.inputs.retention_days || '14' }}
  DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
  CLEAN_RELEASES: ${{ github.event.inputs.clean_releases || 'false' }}

jobs:
  cleanup:
    name: Cleanup stale CI resources
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Compute cutoff timestamp
        id: ts
        run: |
          cutoff_iso=$(date -u -d "${RETENTION_DAYS} days ago" '+%Y-%m-%dT%H:%M:%SZ')
          cutoff_epoch=$(date -u -d "${RETENTION_DAYS} days ago" '+%s')
          echo "cutoff_iso=${cutoff_iso}" >> "$GITHUB_OUTPUT"
          echo "cutoff_epoch=${cutoff_epoch}" >> "$GITHUB_OUTPUT"
          echo "保留窗口：${RETENTION_DAYS} 天，cutoff=${cutoff_iso} (DRY_RUN=${DRY_RUN})"

      # ------------------------------------------------------------------
      # 1) 清理旧的工作流运行记录（保留窗口外、已完成的运行）
      # ------------------------------------------------------------------
      - name: Cleanup old workflow runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CUTOFF: ${{ steps.ts.outputs.cutoff_iso }}
        run: |
          set -uo pipefail
          echo "==> 清理 ${CUTOFF} 之前已完成的 workflow runs"
          deleted=0
          # 列出最近 200 条运行，过滤掉当前运行、未完成的、以及保留窗口内的
          gh run list --repo "${GITHUB_REPOSITORY}" \
              --limit 200 --json databaseId,status,conclusion,createdAt,name \
            | jq -r --arg cutoff "$CUTOFF" --argjson self "${{ github.run_id }}" '
                .[]
                | select(.databaseId != $self)
                | select(.status == "completed")
                | select(.createdAt < $cutoff)
                | "\(.databaseId)\t\(.createdAt)\t\(.name)\t\(.conclusion // \"unknown\")"
              ' \
            | while IFS=$'\t' read -r id created name conclusion; do
                if [ "$DRY_RUN" = "true" ]; then
                  echo "[DRY] 将删除 run id=${id} name=${name} conclusion=${conclusion} createdAt=${created}"
                else
                  echo "删除 run id=${id} name=${name} createdAt=${created}"
                  gh run delete "$id" --repo "${GITHUB_REPOSITORY}" || true
                fi
              done
          echo "workflow runs 清理完成"

      # ------------------------------------------------------------------
      # 2) 清理旧的 artifacts（build 产物体积较大，优先清理）
      # ------------------------------------------------------------------
      - name: Cleanup old artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CUTOFF: ${{ steps.ts.outputs.cutoff_iso }}
        run: |
          set -uo pipefail
          echo "==> 清理 ${CUTOFF} 之前的 artifacts"
          # 通过 API 分页获取全部 artifacts，按 created_at 过滤
          gh api --paginate \
              "/repos/${GITHUB_REPOSITORY}/actions/artifacts" \
            | jq -r --arg cutoff "$CUTOFF" '
                .artifacts[]?
                | select(.created_at < $cutoff)
                | "\(.id)\t\(.name)\t\(.created_at)\t\(.size_in_bytes)"
              ' \
            | while IFS=$'\t' read -r id name created size; do
                size_mb=$(awk "BEGIN{printf \"%.1f\", ${size:-0}/1048576}")
                if [ "$DRY_RUN" = "true" ]; then
                  echo "[DRY] 将删除 artifact id=${id} name=${name} size=${size_mb}MB createdAt=${created}"
                else
                  echo "删除 artifact id=${id} name=${name} size=${size_mb}MB createdAt=${created}"
                  gh api -X DELETE \
                    "/repos/${GITHUB_REPOSITORY}/actions/artifacts/${id}" || true
                fi
              done
          echo "artifacts 清理完成"

      # ------------------------------------------------------------------
      # 3) 清理旧的 Actions caches（sccache / gradle 缓存可能堆积）
      # ------------------------------------------------------------------
      - name: Cleanup old Actions caches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CUTOFF_EPOCH: ${{ steps.ts.outputs.cutoff_epoch }}
        run: |
          set -uo pipefail
          echo "==> 清理 ${RETENTION_DAYS} 天未访问的 Actions caches"
          # 按 lastAccessedAt 过滤；超过保留窗口未访问的缓存视为陈旧
          gh cache list --repo "${GITHUB_REPOSITORY}" \
              --json id,key,lastAccessedAt,sizeInBytes \
            | jq -r --arg cutoff "$CUTOFF_EPOCH" '
                .[]
                | select((.lastAccessedAt | fromdateiso8601) < ($cutoff | tonumber))
                | "\(.id)\t\(.key)\t\(.lastAccessedAt)\t\(.sizeInBytes)"
              ' \
            | while IFS=$'\t' read -r id key last size; do
                size_mb=$(awk "BEGIN{printf \"%.1f\", ${size:-0}/1048576}")
                if [ "$DRY_RUN" = "true" ]; then
                  echo "[DRY] 将删除 cache id=${id} key=${key} size=${size_mb}MB lastAccessedAt=${last}"
                else
                  echo "删除 cache id=${id} key=${key} size=${size_mb}MB lastAccessedAt=${last}"
                  gh cache delete "$id" --repo "${GITHUB_REPOSITORY}" || true
                fi
              done
          echo "caches 清理完成"

      # ------------------------------------------------------------------
      # 4) 可选：清理旧 release（仅保留最新 3 个）
      # ------------------------------------------------------------------
      - name: Cleanup old releases (keep latest 3)
        if: ${{ env.CLEAN_RELEASES == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          keep=3
          echo "==> 仅保留最新 ${keep} 个 release，其余清理"
          # 按创建时间倒序排列，跳过前 ${keep} 个
          gh release list --repo "${GITHUB_REPOSITORY}" \
              --json tagName,createdAt,isDraft,isPrerelease --limit 100 \
            | jq -r --argjson keep "$keep" '
                sort_by(.createdAt) | reverse | to_entries
                | .[$keep:][]
                | "\(.value.tagName)\t\(.value.createdAt)\t\(.value.isDraft)\t\(.value.isPrerelease)"
              ' \
            | while IFS=$'\t' read -r tag created draft prerelease; do
                if [ "$DRY_RUN" = "true" ]; then
                  echo "[DRY] 将删除 release tag=${tag} createdAt=${created} draft=${draft} prerelease=${prerelease}"
                else
                  echo "删除 release tag=${tag} createdAt=${created}"
                  # --cleanup-tag 同时删除对应的 git tag
                  gh release delete "$tag" --repo "${GITHUB_REPOSITORY}" \
                    --yes --cleanup-tag || true
                fi
              done
          echo "releases 清理完成"

      # ------------------------------------------------------------------
      # 汇总报告
      # ------------------------------------------------------------------
      - name: Summary
        if: always()
        run: |
          {
            echo "## 🧹 Cleanup Summary"
            echo ""
            echo "| 项目 | 值 |"
            echo "|---|---|"
            echo "| 仓库 | \`${GITHUB_REPOSITORY}\` |"
            echo "| 保留窗口 | **${RETENTION_DAYS} 天** |"
            echo "| 试运行 (dry_run) | **${DRY_RUN}** |"
            echo "| 清理 releases | **${CLEAN_RELEASES}** |"
            echo "| 截止时间 | ${{ steps.ts.outputs.cutoff_iso }} |"
            echo ""
            if [ "$DRY_RUN" = "true" ]; then
              echo "> ⚠️ 试运行模式，未实际删除任何资源。"
              echo "> 重新触发并取消勾选 **dry_run** 以执行真实清理。"
            else
              echo "> ✅ 清理已完成。"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
